<div class="min-h-screen flex items-center justify-center p-8" style="background: var(--bg)">
  <div class="login-card w-full max-w-[400px]">
    <div class="text-center mb-10">
      <img
        src="assets/NutriaDevLogo.png"
        alt="NutriaDev"
        class="w-16 h-16 mx-auto mb-4"
        style="filter: brightness(0) saturate(100%) invert(94%) sepia(14%) saturate(347%) hue-rotate(5deg) brightness(104%) contrast(92%)"
      />
      <h1 class="text-lg tracking-widest uppercase mb-1" style="color: var(--text); font-weight: 400">
        Acceso Admin
      </h1>
      <p class="text-xs tracking-wide" style="color: var(--text-dim)">
        Ingresa tus credenciales
      </p>
    </div>

    <form (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <div class="flex flex-col gap-1.5">
        <label
          for="email"
          class="text-[0.7rem] tracking-widest uppercase"
          style="color: var(--text-dim)"
        >
          Email
        </label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@nutriadev.com"
          autocomplete="email"
          required
          class="input-field"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label
          for="password"
          class="text-[0.7rem] tracking-widest uppercase"
          style="color: var(--text-dim)"
        >
          Contraseña
        </label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
          autocomplete="current-password"
          required
          class="input-field"
        />
      </div>

      @if (error) {
        <div class="error-msg">{{ error }}</div>
      }

      <button
        type="submit"
        class="btn-submit"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="spinner"></span>
        }
        {{ loading ? 'Entrando…' : 'Entrar' }}
      </button>
    </form>

    <a
      routerLink="/"
      class="block text-center mt-6 text-[0.7rem] tracking-wide no-underline transition-colors duration-300"
      style="color: var(--text-dim)"
      onmouseover="this.style.color='var(--accent)'"
      onmouseout="this.style.color='var(--text-dim)'"
    >
      &larr; Volver al portfolio
    </a>
  </div>
</div>
